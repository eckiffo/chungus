<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$CHUNGUS JUMPER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .back-btn {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      padding: 6px 14px;
      background: rgba(0, 0, 20, 0.85);
      border: 2px solid #ff00ff;
      color: #ffff00;
      font-family: 'Comic Sans MS', cursive;
      font-weight: bold;
      font-size: 12px;
      text-decoration: none;
      text-shadow: 0 0 6px #ff00ff;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <iframe id="chungus-game"
    src="https://chungus-jumper.vercel.app/"
    title="Chungus Jumper"
    width="100%" height="700"
    allow="autoplay; fullscreen; clipboard-write"
    style="border:0;">
  </iframe>
  <a class="back-btn" href="/">&#9668; $CHUNGUS</a>

  <script>
    const room = new URLSearchParams(location.search).get('room');
    if (room) {
      const iframe = document.getElementById('chungus-game');
      const send = () => iframe.contentWindow.postMessage({ type: 'chungus-room', code: room }, '*');
      iframe.addEventListener('load', send);
      window.addEventListener('message', (ev) => { if (ev.data?.type === 'chungus-ready') send(); });
    }
  </script>
</body>
</html>
