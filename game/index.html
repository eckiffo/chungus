<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$CHUNGUS JUMPER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      padding: 8px 16px;
      background: #CC0000;
      border: 3px solid #1A1A1A;
      box-shadow: 4px 4px 0 #1A1A1A;
      color: #FFD700;
      font-family: Impact, 'Arial Black', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .back-btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #1A1A1A; }
  </style>
</head>
<body>
  <iframe id="chungus-game"
    src="https://chungus-jumper.vercel.app/"
    title="Chungus Jumper"
    width="100%" height="700"
    allow="autoplay; fullscreen; clipboard-write"
    style="border:0;">
  </iframe>
  <a class="back-btn" href="/">&#9668; $CHUNGUS</a>

  <script>
    const room = new URLSearchParams(location.search).get('room');
    if (room) {
      const iframe = document.getElementById('chungus-game');
      const send = () => iframe.contentWindow.postMessage({ type: 'chungus-room', code: room }, '*');
      iframe.addEventListener('load', send);
      window.addEventListener('message', (ev) => { if (ev.data?.type === 'chungus-ready') send(); });
    }
  </script>
</body>
</html>
